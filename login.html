<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | TemanRusiaKamu</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100">
  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
      <h1 class="text-2xl font-bold text-gray-800 mb-2">Login</h1>
      <p class="text-gray-500 mb-6">Masuk ke akun TemanRusiaKamu</p>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="email" type="email" required class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input id="password" type="password" required class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button id="submit-btn" type="submit" class="w-full rounded-xl bg-blue-700 text-white py-3 font-semibold hover:bg-blue-800 transition">
          Login
        </button>
      </form>

      <p id="message" class="mt-4 text-sm"></p>
      <p class="mt-6 text-sm text-gray-600">
        Belum punya akun?
        <a href="signup.html" class="text-blue-700 font-semibold hover:underline">Daftar di sini</a>
      </p>
      <p class="mt-2 text-sm text-gray-600">
        <a href="index.html" class="text-gray-500 hover:underline">Kembali ke beranda</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { auth } from "./firebase-config.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const form = document.getElementById("login-form");
    const message = document.getElementById("message");
    const submitBtn = document.getElementById("submit-btn");

    const setMessage = (text, isError = false) => {
      message.textContent = text;
      message.className = `mt-4 text-sm ${isError ? "text-red-600" : "text-green-600"}`;
    };

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "Memproses...";
      setMessage("");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        setMessage("Login berhasil. Mengarahkan ke beranda...");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 900);
      } catch (err) {
        setMessage(err.message, true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
