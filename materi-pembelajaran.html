<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materi Pembelajaran | Дорога в Россию</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #pdf-container {
      position: relative;
      background: #f9fafb;
    }
    #pdf-canvas {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    #text-layer {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      opacity: 0.25;
      line-height: 1;
      pointer-events: auto;
    }
    #text-layer span,
    #text-layer br {
      position: absolute;
      white-space: pre;
      transform-origin: 0% 0%;
      color: transparent;
    }
    #text-layer .highlight {
      margin: -1px;
      padding: 1px;
      background-color: rgba(255, 215, 0, 0.35);
      border-radius: 3px;
    }
    body.night-mode {
      background: #020617;
      color: #e2e8f0;
    }
    body.night-mode header {
      background: rgba(15, 23, 42, 0.95);
      border-color: #1e293b;
    }
    body.night-mode .reader-card {
      background: #0f172a;
      border-color: #1e293b;
      color: #e2e8f0;
    }
    body.night-mode .reader-muted {
      color: #94a3b8;
    }
    body.night-mode .reader-btn {
      border-color: #334155;
      color: #e2e8f0;
      background: #1e293b;
    }
    body.night-mode #pdf-container {
      background: #0b1220;
    }
    .bookmark-item.active {
      background: #dbeafe;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }
    body.night-mode .bookmark-item.active {
      background: #1e3a8a;
      color: #dbeafe;
      border-color: #1d4ed8;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <header class="sticky top-0 z-30 bg-white/95 backdrop-blur border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-slate-900">Materi Pembelajaran</h1>
        <p class="text-sm text-slate-600">E-Book Interaktif: Дорога в Россию</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="toggle-outline" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50 md:hidden">Bookmarks</button>
        <button id="toggle-night" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50">Night Mode</button>
        <a href="index.html" class="reader-btn px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50">Kembali</a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 grid md:grid-cols-[280px_1fr] gap-4">
    <aside id="outline-panel" class="reader-card hidden md:block bg-white rounded-2xl border border-slate-200 shadow p-4 h-fit md:sticky md:top-24">
      <h2 class="font-bold text-slate-900 mb-2">Daftar Isi / Bookmarks</h2>
      <p class="reader-muted text-xs mb-3">Klik judul untuk lompat ke halaman terkait.</p>
      <div id="outline-list" class="space-y-2 max-h-[65vh] overflow-auto pr-1">
        <p class="reader-muted text-sm">Memuat bookmarks...</p>
      </div>
    </aside>

    <div class="space-y-4">
    <section class="reader-card bg-white rounded-2xl border border-slate-200 shadow p-4 md:p-5 mb-4">
      <div class="flex flex-wrap items-center gap-2 md:gap-3">
        <button id="prev-page" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">Previous</button>
        <button id="next-page" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">Next</button>
        <div class="flex items-center gap-2">
          <label for="page-input" class="reader-muted text-sm text-slate-600">Page</label>
          <input id="page-input" type="number" min="1" value="1" class="w-20 px-2 py-2 border border-slate-300 rounded-lg text-sm text-slate-800">
          <button id="go-page" class="px-3 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 text-sm">Go</button>
        </div>
        <div class="flex items-center gap-2 ml-0 md:ml-auto">
          <button id="zoom-out" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">-</button>
          <span id="zoom-label" class="reader-muted text-sm font-medium text-slate-700 w-16 text-center">100%</span>
          <button id="zoom-in" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">+</button>
        </div>
      </div>
      <p id="page-status" class="reader-muted text-sm text-slate-600 mt-3">Loading PDF...</p>
      <p class="reader-muted text-xs text-slate-500 mt-1">Tip: swipe kiri/kanan di Android untuk pindah halaman.</p>
    </section>

    <section class="reader-card bg-white rounded-2xl border border-slate-200 shadow p-4 md:p-5">
      <div id="pdf-container" class="rounded-xl overflow-auto">
        <canvas id="pdf-canvas"></canvas>
        <div id="text-layer"></div>
      </div>
      <div id="pdf-error" class="hidden mt-3 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm"></div>
    </section>
    </div>
  </main>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.5.136/build/pdf.min.mjs";
    import { renderTextLayer } from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.5.136/web/pdf_viewer.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.5.136/build/pdf.worker.min.mjs";

    // IMPORTANT:
    // Upload the ebook into your repo, for example:
    // D:/temanrusiakamu/assets/ebooks/doroga-v-rossiyu.pdf
    // then keep this URL as-is (relative to site root).
    const PDF_URL = "./assets/ebooks/doroga-v-rossiyu.pdf";

    const canvas = document.getElementById("pdf-canvas");
    const ctx = canvas.getContext("2d");
    const textLayer = document.getElementById("text-layer");
    const pageStatus = document.getElementById("page-status");
    const pdfError = document.getElementById("pdf-error");
    const outlinePanel = document.getElementById("outline-panel");
    const outlineList = document.getElementById("outline-list");
    const toggleNightBtn = document.getElementById("toggle-night");
    const toggleOutlineBtn = document.getElementById("toggle-outline");

    const prevBtn = document.getElementById("prev-page");
    const nextBtn = document.getElementById("next-page");
    const zoomInBtn = document.getElementById("zoom-in");
    const zoomOutBtn = document.getElementById("zoom-out");
    const zoomLabel = document.getElementById("zoom-label");
    const pageInput = document.getElementById("page-input");
    const goPageBtn = document.getElementById("go-page");

    let pdfDoc = null;
    let pageNum = 1;
    let scale = 1.15;
    let isRendering = false;
    let pendingPage = null;
    let currentOutlinePage = null;

    function showError(message) {
      pdfError.textContent = message;
      pdfError.classList.remove("hidden");
    }

    function hideError() {
      pdfError.classList.add("hidden");
      pdfError.textContent = "";
    }

    async function renderPage(num) {
      if (!pdfDoc) return;
      isRendering = true;
      hideError();

      const page = await pdfDoc.getPage(num);
      const viewport = page.getViewport({ scale });
      canvas.height = viewport.height;
      canvas.width = viewport.width;
      canvas.style.width = `${viewport.width}px`;
      canvas.style.height = `${viewport.height}px`;

      textLayer.innerHTML = "";
      textLayer.style.width = `${viewport.width}px`;
      textLayer.style.height = `${viewport.height}px`;
      textLayer.style.left = `${canvas.offsetLeft}px`;
      textLayer.style.top = `${canvas.offsetTop}px`;

      await page.render({ canvasContext: ctx, viewport }).promise;
      const textContent = await page.getTextContent();

      renderTextLayer({
        textContentSource: textContent,
        container: textLayer,
        viewport,
      });

      pageStatus.textContent = `Page ${num} of ${pdfDoc.numPages}`;
      pageInput.value = String(num);
      zoomLabel.textContent = `${Math.round(scale * 100)}%`;
      highlightActiveBookmark(num);

      isRendering = false;
      if (pendingPage !== null) {
        const target = pendingPage;
        pendingPage = null;
        queueRenderPage(target);
      }
    }

    function queueRenderPage(num) {
      if (isRendering) {
        pendingPage = num;
      } else {
        renderPage(num).catch((err) => {
          showError(`Gagal merender halaman: ${err.message}`);
          isRendering = false;
        });
      }
    }

    function changePage(offset) {
      if (!pdfDoc) return;
      const next = pageNum + offset;
      if (next < 1 || next > pdfDoc.numPages) return;
      pageNum = next;
      queueRenderPage(pageNum);
    }

    prevBtn.addEventListener("click", () => changePage(-1));
    nextBtn.addEventListener("click", () => changePage(1));

    zoomInBtn.addEventListener("click", () => {
      scale = Math.min(2.5, scale + 0.1);
      queueRenderPage(pageNum);
    });

    zoomOutBtn.addEventListener("click", () => {
      scale = Math.max(0.6, scale - 0.1);
      queueRenderPage(pageNum);
    });

    goPageBtn.addEventListener("click", () => {
      if (!pdfDoc) return;
      const requested = Number(pageInput.value);
      if (!Number.isInteger(requested) || requested < 1 || requested > pdfDoc.numPages) return;
      pageNum = requested;
      queueRenderPage(pageNum);
    });

    pageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") goPageBtn.click();
    });

    toggleNightBtn.addEventListener("click", () => {
      document.body.classList.toggle("night-mode");
      toggleNightBtn.textContent = document.body.classList.contains("night-mode") ? "Light Mode" : "Night Mode";
    });

    toggleOutlineBtn.addEventListener("click", () => {
      outlinePanel.classList.toggle("hidden");
    });

    function highlightActiveBookmark(page) {
      if (!outlineList) return;
      if (currentOutlinePage === page) return;
      currentOutlinePage = page;
      outlineList.querySelectorAll("[data-page]").forEach((el) => {
        const isActive = Number(el.dataset.page) === page;
        el.classList.toggle("active", isActive);
      });
    }

    async function resolveDestToPage(dest) {
      if (!dest || !pdfDoc) return null;
      let destination = dest;
      if (typeof dest === "string") {
        destination = await pdfDoc.getDestination(dest);
      }
      if (!Array.isArray(destination) || !destination[0]) return null;
      const pageIndex = await pdfDoc.getPageIndex(destination[0]);
      return pageIndex + 1;
    }

    async function renderOutline() {
      if (!pdfDoc || !outlineList) return;
      outlineList.innerHTML = "";
      const outline = await pdfDoc.getOutline();
      if (!outline || outline.length === 0) {
        outlineList.innerHTML = `<p class="reader-muted text-sm">Tidak ada bookmarks bawaan PDF.</p>`;
        return;
      }

      async function appendItems(items, level = 0) {
        for (const item of items) {
          const page = await resolveDestToPage(item.dest);
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "bookmark-item w-full text-left text-sm px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-50";
          btn.style.marginLeft = `${level * 10}px`;
          btn.textContent = page ? `${item.title} (p.${page})` : item.title;
          if (page) {
            btn.dataset.page = String(page);
            btn.addEventListener("click", () => {
              pageNum = page;
              queueRenderPage(pageNum);
              if (window.innerWidth < 768) outlinePanel.classList.add("hidden");
            });
          } else {
            btn.disabled = true;
            btn.classList.add("opacity-60", "cursor-not-allowed");
          }
          outlineList.appendChild(btn);
          if (item.items && item.items.length > 0) {
            await appendItems(item.items, level + 1);
          }
        }
      }

      await appendItems(outline);
    }

    function setupSwipeNavigation() {
      let startX = 0;
      let startY = 0;
      const threshold = 60;
      const container = document.getElementById("pdf-container");
      if (!container) return;

      container.addEventListener("touchstart", (e) => {
        const t = e.changedTouches[0];
        startX = t.clientX;
        startY = t.clientY;
      }, { passive: true });

      container.addEventListener("touchend", (e) => {
        const t = e.changedTouches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        if (Math.abs(dx) < threshold || Math.abs(dx) < Math.abs(dy)) return;
        if (dx < 0) {
          changePage(1);
        } else {
          changePage(-1);
        }
      }, { passive: true });
    }

    async function initPdf() {
      try {
        const loadingTask = pdfjsLib.getDocument(PDF_URL);
        pdfDoc = await loadingTask.promise;
        await renderOutline();
        setupSwipeNavigation();
        pageStatus.textContent = `Page 1 of ${pdfDoc.numPages}`;
        queueRenderPage(pageNum);
      } catch (err) {
        showError(
          "PDF belum ditemukan. Upload file ke `assets/ebooks/doroga-v-rossiyu.pdf` lalu refresh halaman."
        );
        pageStatus.textContent = "PDF belum siap.";
      }
    }

    initPdf();
  </script>
</body>
</html>
