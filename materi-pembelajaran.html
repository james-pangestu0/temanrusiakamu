<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materi Pembelajaran | Дорога в Россию</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #pdf-container {
      position: relative;
      background: #f9fafb;
      text-align: center;
    }
    #pdf-page-wrap {
      position: relative;
      display: inline-block;
      margin: 0 auto;
    }
    #pdf-canvas {
      display: block;
      margin: 0;
      max-width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    #text-layer {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      opacity: 0.25;
      line-height: 1;
      pointer-events: auto;
    }
    #text-layer span,
    #text-layer br {
      position: absolute;
      white-space: pre;
      transform-origin: 0% 0%;
      color: transparent;
    }
    #text-layer .highlight {
      margin: -1px;
      padding: 1px;
      background-color: rgba(255, 215, 0, 0.35);
      border-radius: 3px;
    }
    body.night-mode {
      background: #0f172a;
      color: #0f172a;
    }
    body.night-mode header {
      background: rgba(241, 245, 249, 0.95);
      border-color: #cbd5e1;
    }
    body.night-mode header h1,
    body.night-mode header p {
      color: #0f172a !important;
    }
    body.night-mode .reader-card {
      background: #e2e8f0;
      border-color: #94a3b8;
      color: #0f172a;
    }
    body.night-mode .reader-muted {
      color: #334155;
    }
    body.night-mode .reader-btn {
      border-color: #64748b;
      color: #0f172a;
      background: #f1f5f9;
    }
    body.night-mode #pdf-container {
      background: #cbd5e1;
    }
    .bookmark-item.active {
      background: #dbeafe;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }
    .outline-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      width: 100%;
    }
    .outline-arrow-btn {
      flex-shrink: 0;
      width: 32px;
      min-height: 38px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #64748b;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }
    .outline-arrow-btn:hover {
      background: #e2e8f0;
    }
    .outline-title-btn {
      flex: 1;
      text-align: left;
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      background: #fff;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .outline-title-btn:hover {
      background: #f8fafc;
    }
    .outline-toggle {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      background: #fff;
    }
    .outline-arrow {
      display: inline-block;
      width: 14px;
      text-align: center;
      color: #64748b;
      transition: transform 0.2s ease;
    }
    .outline-arrow.expanded {
      transform: rotate(180deg);
    }
    .outline-children {
      margin-top: 6px;
      margin-left: 12px;
      border-left: 2px dashed #cbd5e1;
      padding-left: 10px;
      display: none;
    }
    .outline-children.show {
      display: block;
    }
    body.night-mode .bookmark-item.active {
      background: #bfdbfe;
      color: #1e3a8a;
      border-color: #3b82f6;
    }
    body.night-mode .outline-toggle {
      background: #f1f5f9;
      border-color: #94a3b8;
      color: #0f172a;
    }
    body.night-mode .outline-arrow {
      color: #475569;
    }
    .pdf-side-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 36px;
      height: 72px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(255, 255, 255, 0.75);
      color: #1e293b;
      border-radius: 9999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      backdrop-filter: blur(4px);
    }
    #pdf-container:hover .pdf-side-nav {
      opacity: 1;
      pointer-events: auto;
    }
    .pdf-side-nav.left {
      left: 10px;
    }
    .pdf-side-nav.right {
      right: 10px;
    }
    @media (max-width: 1024px) {
      .pdf-side-nav {
        display: none;
      }
    }
    .notepad {
      position: fixed;
      right: 14px;
      bottom: 14px;
      width: min(360px, calc(100vw - 28px));
      z-index: 40;
    }
    body.night-mode #note-input {
      background: #ffffff;
      color: #0f172a;
      border-color: #94a3b8;
    }
    body.night-mode #notepad-panel {
      background: #e2e8f0;
      border-color: #94a3b8;
    }
    body.night-mode #page-input {
      background: #ffffff;
      color: #0f172a;
      border-color: #64748b;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <header class="sticky top-0 z-30 bg-white/95 backdrop-blur border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-slate-900">Materi Pembelajaran</h1>
        <p class="text-sm text-slate-600">E-Book Interaktif: Дорога в Россию</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="toggle-outline" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50 md:hidden">Bookmarks</button>
        <button id="toggle-night" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50">Night Mode</button>
        <a href="index.html" class="reader-btn px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50">Kembali</a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 grid md:grid-cols-[280px_1fr] gap-4">
    <aside id="outline-panel" class="reader-card hidden md:block bg-white rounded-2xl border border-slate-200 shadow p-4 h-fit md:sticky md:top-24">
      <h2 class="font-bold text-slate-900 mb-2">Daftar Isi / Bookmarks</h2>
      <p class="reader-muted text-xs mb-3">Klik judul untuk lompat ke halaman terkait.</p>
      <div id="outline-list" class="space-y-2 max-h-[65vh] overflow-auto pr-1">
        <p class="reader-muted text-sm">Memuat bookmarks...</p>
      </div>
    </aside>

    <div class="space-y-4">
    <section class="reader-card bg-white rounded-2xl border border-slate-200 shadow p-4 md:p-5">
      <div id="pdf-container" class="rounded-xl overflow-auto">
        <button id="side-prev" class="pdf-side-nav left" type="button" aria-label="Previous page">‹</button>
        <div id="pdf-page-wrap">
          <canvas id="pdf-canvas"></canvas>
          <div id="text-layer"></div>
        </div>
        <button id="side-next" class="pdf-side-nav right" type="button" aria-label="Next page">›</button>
      </div>
      <div id="pdf-error" class="hidden mt-3 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm"></div>
    </section>

    <section class="reader-card bg-white rounded-2xl border border-slate-200 shadow p-4 md:p-5 mb-4">
      <p id="page-status" class="reader-muted text-sm text-slate-600">Loading PDF...</p>
      <p class="reader-muted text-xs text-slate-500 mt-1 mb-3">Tip: swipe kiri/kanan di Android untuk pindah halaman.</p>
      <div class="flex flex-wrap items-center gap-2 md:gap-3">
        <button id="prev-page" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">Previous</button>
        <button id="next-page" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">Next</button>
        <div class="flex items-center gap-2">
          <label for="page-input" class="reader-muted text-sm text-slate-600">Page</label>
          <input id="page-input" type="number" min="1" value="1" class="w-20 px-2 py-2 border border-slate-300 rounded-lg text-sm text-slate-800">
          <button id="go-page" class="px-3 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 text-sm">Go</button>
        </div>
        <div class="flex items-center gap-2 ml-0 md:ml-auto">
          <button id="zoom-out" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">-</button>
          <span id="zoom-label" class="reader-muted text-sm font-medium text-slate-700 w-16 text-center">100%</span>
          <button id="zoom-in" class="reader-btn px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">+</button>
        </div>
      </div>
    </section>
    </div>
  </main>

  <section class="notepad">
    <div id="notepad-panel" class="bg-white border border-slate-200 rounded-xl shadow-lg">
      <div class="flex items-center justify-between p-3 border-b border-slate-100">
        <h3 class="font-semibold text-slate-800 text-sm">Notepad</h3>
        <div class="flex items-center gap-2">
          <button id="save-note" class="text-xs px-2 py-1 rounded bg-blue-600 text-white hover:bg-blue-700">Save</button>
          <button id="minimize-note" class="text-xs px-2 py-1 rounded border border-slate-300 hover:bg-slate-50">_</button>
        </div>
      </div>
      <textarea id="note-input" rows="8" class="w-full p-3 text-sm text-slate-700 rounded-b-xl focus:outline-none" placeholder="Tulis catatan belajar kamu di sini..."></textarea>
    </div>
    <button id="open-note" class="hidden w-full bg-blue-600 text-white py-2 rounded-xl shadow hover:bg-blue-700">Open Notepad</button>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const pdfjsLib = window["pdfjs-dist/build/pdf"];
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    // IMPORTANT:
    // Upload the ebook into your repo, for example:
    // D:/temanrusiakamu/assets/ebooks/doroga-v-rossiyu.pdf
    // then keep this URL as-is (relative to site root).
    const PDF_URL = "./assets/ebooks/doroga-v-rossiyu.pdf";

    const canvas = document.getElementById("pdf-canvas");
    const ctx = canvas.getContext("2d");
    const textLayer = document.getElementById("text-layer");
    const pageWrap = document.getElementById("pdf-page-wrap");
    const pageStatus = document.getElementById("page-status");
    const pdfError = document.getElementById("pdf-error");
    const outlinePanel = document.getElementById("outline-panel");
    const outlineList = document.getElementById("outline-list");
    const toggleNightBtn = document.getElementById("toggle-night");
    const toggleOutlineBtn = document.getElementById("toggle-outline");

    const prevBtn = document.getElementById("prev-page");
    const nextBtn = document.getElementById("next-page");
    const zoomInBtn = document.getElementById("zoom-in");
    const zoomOutBtn = document.getElementById("zoom-out");
    const zoomLabel = document.getElementById("zoom-label");
    const pageInput = document.getElementById("page-input");
    const goPageBtn = document.getElementById("go-page");
    const sidePrevBtn = document.getElementById("side-prev");
    const sideNextBtn = document.getElementById("side-next");
    const pdfContainer = document.getElementById("pdf-container");
    const notepadPanel = document.getElementById("notepad-panel");
    const openNoteBtn = document.getElementById("open-note");
    const minimizeNoteBtn = document.getElementById("minimize-note");
    const saveNoteBtn = document.getElementById("save-note");
    const noteInput = document.getElementById("note-input");

    let pdfDoc = null;
    let pageNum = 1;
    let scale = 1.15;
    let zoomFactor = 1;
    let isRendering = false;
    let pendingPage = null;
    let currentOutlinePage = null;

    function showError(message) {
      pdfError.textContent = message;
      pdfError.classList.remove("hidden");
    }

    function hideError() {
      pdfError.classList.add("hidden");
      pdfError.textContent = "";
    }

    async function renderPage(num) {
      if (!pdfDoc) return;
      isRendering = true;
      hideError();

      const page = await pdfDoc.getPage(num);
      const baseViewport = page.getViewport({ scale: 1 });
      const isMobile = window.innerWidth <= 768;
      const fitScale = Math.max(0.6, (pdfContainer.clientWidth - 12) / baseViewport.width);
      const renderScale = isMobile ? fitScale * zoomFactor : scale;
      const viewport = page.getViewport({ scale: renderScale });
      canvas.height = viewport.height;
      canvas.width = viewport.width;
      canvas.style.width = `${viewport.width}px`;
      canvas.style.height = `${viewport.height}px`;
      pageWrap.style.width = `${viewport.width}px`;
      pageWrap.style.height = `${viewport.height}px`;

      textLayer.innerHTML = "";
      textLayer.style.position = "absolute";
      textLayer.style.left = "0px";
      textLayer.style.top = "0px";
      textLayer.style.width = `${viewport.width}px`;
      textLayer.style.height = `${viewport.height}px`;

      await page.render({ canvasContext: ctx, viewport }).promise;
      const textContent = await page.getTextContent();

      if (pdfjsLib.renderTextLayer) {
        pdfjsLib.renderTextLayer({
          textContent,
          container: textLayer,
          viewport,
          textDivs: [],
        });
      }

      pageStatus.textContent = `Page ${num} of ${pdfDoc.numPages}`;
      pageInput.value = String(num);
      zoomLabel.textContent = `${Math.round((isMobile ? renderScale : scale) * 100)}%`;
      highlightActiveBookmark(num);

      isRendering = false;
      if (pendingPage !== null) {
        const target = pendingPage;
        pendingPage = null;
        queueRenderPage(target);
      }
    }

    function queueRenderPage(num) {
      if (isRendering) {
        pendingPage = num;
      } else {
        renderPage(num).catch((err) => {
          showError(`Gagal merender halaman: ${err.message}`);
          isRendering = false;
        });
      }
    }

    function changePage(offset) {
      if (!pdfDoc) return;
      const next = pageNum + offset;
      if (next < 1 || next > pdfDoc.numPages) return;
      pageNum = next;
      queueRenderPage(pageNum);
    }

    prevBtn.addEventListener("click", () => changePage(-1));
    nextBtn.addEventListener("click", () => changePage(1));

    zoomInBtn.addEventListener("click", () => {
      if (window.innerWidth <= 768) {
        zoomFactor = Math.min(2.2, zoomFactor + 0.1);
      } else {
        scale = Math.min(2.5, scale + 0.1);
      }
      queueRenderPage(pageNum);
    });

    zoomOutBtn.addEventListener("click", () => {
      if (window.innerWidth <= 768) {
        zoomFactor = Math.max(0.7, zoomFactor - 0.1);
      } else {
        scale = Math.max(0.6, scale - 0.1);
      }
      queueRenderPage(pageNum);
    });

    goPageBtn.addEventListener("click", () => {
      if (!pdfDoc) return;
      const requested = Number(pageInput.value);
      if (!Number.isInteger(requested) || requested < 1 || requested > pdfDoc.numPages) return;
      pageNum = requested;
      queueRenderPage(pageNum);
    });

    pageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") goPageBtn.click();
    });

    sidePrevBtn.addEventListener("click", () => changePage(-1));
    sideNextBtn.addEventListener("click", () => changePage(1));

    toggleNightBtn.addEventListener("click", () => {
      document.body.classList.toggle("night-mode");
      toggleNightBtn.textContent = document.body.classList.contains("night-mode") ? "Light Mode" : "Night Mode";
    });

    toggleOutlineBtn.addEventListener("click", () => {
      outlinePanel.classList.toggle("hidden");
    });

    function highlightActiveBookmark(page) {
      if (!outlineList) return;
      currentOutlinePage = page;
      outlineList.querySelectorAll("[data-page]").forEach((el) => {
        const isActive = Number(el.dataset.page) === page;
        el.classList.toggle("active", isActive);
      });
    }

    async function resolveDestToPage(dest) {
      if (!dest || !pdfDoc) return null;
      let destination = dest;
      if (typeof dest === "string") {
        destination = await pdfDoc.getDestination(dest);
      }
      if (!Array.isArray(destination) || !destination[0]) return null;
      const pageIndex = await pdfDoc.getPageIndex(destination[0]);
      return pageIndex + 1;
    }

    /** Many PDFs return a flat outline (no item.items). Build chapter → subsection tree. */
    function buildSyntheticOutline(flatItems) {
      if (!flatItems?.length) return [];
      const hasNested = flatItems.some((i) => i.items && i.items.length);
      if (hasNested) return flatItems;

      const roots = [];
      let current = null;
      const isMajor = (title) => {
        const t = (title || "").trim();
        return /^(Глава|Часть|Раздел|Введение|Приложение|Тест|Итог|Заключение)\b/i.test(t)
          || /^Урок\s*\d+/i.test(t)
          || /^Часть\s*[IVX\d]/i.test(t);
      };

      for (const it of flatItems) {
        const node = { title: it.title, dest: it.dest, items: it.items };
        if (isMajor(it.title)) {
          current = { title: it.title, dest: it.dest, items: [] };
          roots.push(current);
        } else if (current) {
          current.items.push({ title: it.title, dest: it.dest });
        } else {
          roots.push({ title: it.title, dest: it.dest, items: [] });
        }
      }
      return roots;
    }

    async function renderOutline() {
      if (!pdfDoc || !outlineList) return;
      outlineList.innerHTML = "";
      const raw = await pdfDoc.getOutline();
      if (!raw || raw.length === 0) {
        outlineList.innerHTML = `<p class="reader-muted text-sm">Tidak ada bookmarks bawaan PDF.</p>`;
        return;
      }

      const outline = buildSyntheticOutline(raw);

      async function appendItems(items, container, level = 0) {
        for (const item of items) {
          const page = await resolveDestToPage(item.dest);
          const hasChildren = item.items && item.items.length > 0;

          const row = document.createElement("div");
          row.className = "outline-block";
          row.style.marginLeft = `${level * 10}px`;

          const rowInner = document.createElement("div");
          rowInner.className = "outline-row";

          let childWrap = null;
          let arrowBtn = null;

          if (hasChildren) {
            childWrap = document.createElement("div");
            childWrap.className = "outline-children";
            arrowBtn = document.createElement("button");
            arrowBtn.type = "button";
            arrowBtn.className = "outline-arrow-btn";
            arrowBtn.setAttribute("aria-expanded", "false");
            arrowBtn.setAttribute("aria-label", "Buka sub-bab");
            arrowBtn.innerHTML = '<span class="outline-arrow">▼</span>';
            arrowBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              const open = childWrap.classList.toggle("show");
              arrowBtn.setAttribute("aria-expanded", open ? "true" : "false");
              const ar = arrowBtn.querySelector(".outline-arrow");
              if (ar) ar.classList.toggle("expanded", open);
            });
          }

          const titleBtn = document.createElement("button");
          titleBtn.type = "button";
          titleBtn.className = "bookmark-item outline-title-btn text-sm";
          titleBtn.textContent = page ? `${item.title} (p.${page})` : item.title;

          if (page) {
            titleBtn.dataset.page = String(page);
            titleBtn.addEventListener("click", () => {
              pageNum = page;
              queueRenderPage(pageNum);
              if (window.innerWidth < 768) outlinePanel.classList.add("hidden");
            });
          } else {
            titleBtn.disabled = true;
            titleBtn.classList.add("opacity-60", "cursor-not-allowed");
          }

          if (hasChildren) {
            rowInner.appendChild(arrowBtn);
          } else {
            const spacer = document.createElement("span");
            spacer.className = "w-8 flex-shrink-0";
            rowInner.appendChild(spacer);
          }
          rowInner.appendChild(titleBtn);
          row.appendChild(rowInner);

          if (hasChildren) {
            row.appendChild(childWrap);
            await appendItems(item.items, childWrap, level + 1);
          }

          container.appendChild(row);
        }
      }

      await appendItems(outline, outlineList);
    }

    function setupSwipeNavigation() {
      let startX = 0;
      let startY = 0;
      const threshold = 60;
      const container = document.getElementById("pdf-container");
      if (!container) return;

      container.addEventListener("touchstart", (e) => {
        const t = e.changedTouches[0];
        startX = t.clientX;
        startY = t.clientY;
      }, { passive: true });

      container.addEventListener("touchend", (e) => {
        const t = e.changedTouches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        if (Math.abs(dx) < threshold || Math.abs(dx) < Math.abs(dy)) return;
        if (dx < 0) {
          changePage(1);
        } else {
          changePage(-1);
        }
      }, { passive: true });
    }

    window.addEventListener("resize", () => {
      if (!pdfDoc) return;
      queueRenderPage(pageNum);
    });

    const NOTE_KEY = "materiPembelajaranNotes";
    noteInput.value = localStorage.getItem(NOTE_KEY) || "";

    saveNoteBtn.addEventListener("click", () => {
      localStorage.setItem(NOTE_KEY, noteInput.value);
      saveNoteBtn.textContent = "Saved";
      setTimeout(() => { saveNoteBtn.textContent = "Save"; }, 1200);
    });

    minimizeNoteBtn.addEventListener("click", () => {
      notepadPanel.classList.add("hidden");
      openNoteBtn.classList.remove("hidden");
    });

    openNoteBtn.addEventListener("click", () => {
      openNoteBtn.classList.add("hidden");
      notepadPanel.classList.remove("hidden");
    });

    async function initPdf() {
      try {
        const loadingTask = pdfjsLib.getDocument({
          url: PDF_URL,
          cMapUrl: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/",
          cMapPacked: true,
        });
        pdfDoc = await loadingTask.promise;
        await renderOutline();
        setupSwipeNavigation();
        pageStatus.textContent = `Page 1 of ${pdfDoc.numPages}`;
        queueRenderPage(pageNum);
      } catch (err) {
        console.error("PDF load error:", err);
        showError(
          "PDF gagal dimuat. Cek URL file, izin akses publik file, dan CORS host. Pastikan file bisa dibuka langsung lewat browser."
        );
        pageStatus.textContent = "PDF belum siap.";
      }
    }

    initPdf();
  </script>
</body>
</html>
