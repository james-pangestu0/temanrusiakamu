<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materi Pembelajaran Rusia A1</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-50 via-indigo-50 to-pink-50 text-gray-800">
  <header class="sticky top-0 z-30 backdrop-blur bg-white/85 border-b border-indigo-100">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
      <div>
        <h1 class="text-xl md:text-2xl font-extrabold text-indigo-900">Russian A1 Textbook Module</h1>
        <p class="text-sm text-indigo-700">15 Chapter - 5 Pages per Chapter - Gaya Buku Ajar Interaktif</p>
      </div>
      <a href="index.html" class="px-4 py-2 rounded-lg border border-indigo-200 text-indigo-700 hover:bg-indigo-50">Kembali</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6 space-y-5">
    <section id="chapter-cover" class="rounded-3xl p-6 md:p-8 shadow-lg text-white"></section>

    <section class="bg-white rounded-2xl p-4 md:p-5 shadow border border-indigo-100">
      <div class="flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
        <div>
          <p id="progress-label" class="text-sm text-indigo-700 font-semibold"></p>
          <h2 id="page-title" class="text-xl font-bold text-indigo-900"></h2>
          <p id="page-subtitle" class="text-sm text-gray-600 mt-1"></p>
        </div>
        <div class="flex items-center gap-2">
          <button id="prev-page-btn" class="px-3 py-2 rounded-lg border border-gray-300 hover:bg-gray-50">Previous Page</button>
          <button id="next-page-btn" class="px-3 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">Next Page</button>
        </div>
      </div>
    </section>

    <section class="grid md:grid-cols-2 gap-4">
      <img id="page-image-1" src="" alt="Ilustrasi materi" class="w-full h-56 object-cover rounded-2xl border border-indigo-100 shadow">
      <img id="page-image-2" src="" alt="Ilustrasi materi" class="w-full h-56 object-cover rounded-2xl border border-indigo-100 shadow">
    </section>

    <section class="bg-white rounded-2xl p-5 md:p-6 shadow border border-indigo-100">
      <h3 class="text-lg font-bold text-indigo-900 mb-3">Materi Inti (Textbook Style)</h3>
      <div id="textbook-content" class="space-y-4 text-[15px] leading-7 text-gray-700"></div>
    </section>

    <section class="bg-white rounded-2xl p-5 md:p-6 shadow border border-indigo-100">
      <h3 class="text-lg font-bold text-indigo-900 mb-3">Kotak Ringkasan dan Catatan Guru</h3>
      <ul id="teacher-notes" class="list-disc pl-6 space-y-2 text-gray-700"></ul>
    </section>

    <section class="bg-white rounded-2xl p-4 shadow border border-indigo-100 flex items-center justify-between gap-3">
      <button id="prev-chapter-btn" class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-50">Previous Chapter</button>
      <button id="next-chapter-btn" class="px-4 py-2 rounded-lg bg-fuchsia-600 text-white hover:bg-fuchsia-700">Next Chapter</button>
    </section>
  </main>

  <script>
    const chapters = [
      { title: "Alphabet and Pronunciation", theme: "Alfabet Kiril, bunyi, dan ritme kata Rusia", colors: ["#1d4ed8", "#7c3aed"], focus: "mengenali huruf Kiril dan membaca kata dasar", vocab: ["Привет", "Спасибо", "Пока", "Да", "Нет"], grammar: "pengantar bunyi vokal-konsonan, tanda lunak, dan tekanan kata" },
      { title: "Greetings and Politeness", theme: "Sapaan formal-informal dan etika komunikasi", colors: ["#0f766e", "#0891b2"], focus: "mengucapkan salam sesuai konteks sosial", vocab: ["Здравствуйте", "Доброе утро", "Извините", "Пожалуйста"], grammar: "kalimat nominal sederhana dan intonasi sopan" },
      { title: "Self Introduction", theme: "Perkenalan nama, asal, dan bahasa", colors: ["#be185d", "#9333ea"], focus: "membuat perkenalan diri singkat dan jelas", vocab: ["Меня зовут", "Я из", "Я говорю по-русски"], grammar: "kata ganti orang dan pola identitas dasar" },
      { title: "Numbers and Age", theme: "Angka 0-100, umur, dan data pribadi", colors: ["#c2410c", "#ea580c"], focus: "menyebut angka dan menanyakan umur", vocab: ["Один", "Двадцать", "Сколько вам лет?"], grammar: "struktur мне ... лет" },
      { title: "Time and Schedule", theme: "Hari, tanggal, jam, dan jadwal", colors: ["#2563eb", "#14b8a6"], focus: "membuat janji sederhana dalam bahasa Rusia", vocab: ["Сегодня", "Завтра", "В час", "В среду"], grammar: "preposisi waktu dan ekspresi jam" },
      { title: "Present Tense Verbs", theme: "Konjugasi kata kerja aktif sehari-hari", colors: ["#4338ca", "#7c3aed"], focus: "membentuk kalimat kegiatan rutin", vocab: ["Работать", "Учиться", "Жить", "Говорить"], grammar: "konjugasi present tense dasar" },
      { title: "Questions and Negation", theme: "Bertanya, klarifikasi, dan negasi", colors: ["#334155", "#0f172a"], focus: "membuat pertanyaan sederhana dan jawaban negatif", vocab: ["Кто", "Что", "Где", "Почему", "Не"], grammar: "posisi partikel не dan pola interrogatif" },
      { title: "Family and Profession", theme: "Mendeskripsikan keluarga dan pekerjaan", colors: ["#15803d", "#16a34a"], focus: "bercerita tentang keluarga inti", vocab: ["Семья", "Мама", "Папа", "Врач", "Учитель"], grammar: "possessive pronouns dan deskripsi personal" },
      { title: "Adjective Agreement", theme: "Kesesuaian kata sifat dengan gender", colors: ["#be123c", "#ec4899"], focus: "menjelaskan benda dan orang secara natural", vocab: ["Большой", "Новый", "Красивый"], grammar: "agreement adjective + noun di nominative" },
      { title: "Accusative Case", theme: "Objek langsung dalam aktivitas harian", colors: ["#111827", "#1f2937"], focus: "menggunakan bentuk objek dengan tepat", vocab: ["Книгу", "Воду", "Газету"], grammar: "perubahan akhir kata pada accusative" },
      { title: "Prepositional Case", theme: "Lokasi dan kegiatan di suatu tempat", colors: ["#0369a1", "#0ea5e9"], focus: "menjelaskan posisi dan keberadaan", vocab: ["В школе", "На работе", "В городе"], grammar: "prepositional dengan в / на" },
      { title: "Shopping and Food", theme: "Interaksi di toko, pasar, dan kafe", colors: ["#92400e", "#f59e0b"], focus: "menanyakan harga dan memesan makanan", vocab: ["Сколько стоит?", "Я хочу", "Хлеб", "Молоко"], grammar: "accusative untuk kebutuhan belanja" },
      { title: "Directions and Transport", theme: "Meminta arah dan alat transportasi", colors: ["#7f1d1d", "#dc2626"], focus: "navigasi dasar di kota berbahasa Rusia", vocab: ["Прямо", "Налево", "Направо", "Метро"], grammar: "imperatif sopan dan preposisi arah" },
      { title: "Health and Pharmacy", theme: "Keluhan ringan dan kebutuhan medis", colors: ["#166534", "#22c55e"], focus: "menyampaikan kondisi tubuh dengan jelas", vocab: ["У меня болит", "Мне нужен врач", "Аптека"], grammar: "konstruksi у меня + kondisi" },
      { title: "A1 Final Consolidation", theme: "Integrasi komunikasi A1 dalam skenario nyata", colors: ["#4c1d95", "#a21caf"], focus: "menggabungkan semua kompetensi A1", vocab: ["Каждый день", "О себе", "Я изучаю"], grammar: "review struktur utama A1" }
    ];

    const pageTitles = [
      "Pembukaan Konsep",
      "Pola Inti dan Struktur Kalimat",
      "Latihan Konteks Kehidupan Nyata",
      "Pendalaman Gaya Penutur Asli",
      "Rangkuman Materi Bab"
    ];

    let chapterIndex = 0;
    let pageIndex = 0;

    const chapterCover = document.getElementById("chapter-cover");
    const progressLabel = document.getElementById("progress-label");
    const pageTitle = document.getElementById("page-title");
    const pageSubtitle = document.getElementById("page-subtitle");
    const textbookContent = document.getElementById("textbook-content");
    const teacherNotes = document.getElementById("teacher-notes");
    const pageImage1 = document.getElementById("page-image-1");
    const pageImage2 = document.getElementById("page-image-2");

    const prevPageBtn = document.getElementById("prev-page-btn");
    const nextPageBtn = document.getElementById("next-page-btn");
    const prevChapterBtn = document.getElementById("prev-chapter-btn");
    const nextChapterBtn = document.getElementById("next-chapter-btn");

    function longParagraph(ch, pageNo, angle) {
      return `${ch.theme.charAt(0).toUpperCase() + ch.theme.slice(1)} menjadi inti pembelajaran pada bagian ini. Pada Chapter ${chapterIndex + 1}, halaman ${pageNo}, siswa diarahkan untuk memahami ${ch.focus} melalui pendekatan bertahap seperti buku teks formal: pemaparan konteks, contoh autentik, observasi pola, lalu reproduksi kalimat. Dalam praktik kelas, pengajar mendorong peserta untuk membaca contoh secara lantang, menandai tekanan kata, dan mengidentifikasi fungsi bentuk kalimat yang muncul. Pendekatan ini membantu siswa pemula menghubungkan teori dan penggunaan nyata, sehingga kosakata ${ch.vocab.join(", ")} tidak sekadar dihafal, tetapi dipakai dalam situasi komunikasi harian. ${angle} Materi juga menekankan kemandirian belajar: siswa menulis ringkasan kecil, membuat dua variasi dialog baru, serta mengulang bentuk grammar ${ch.grammar} hingga akurat dan natural.`;
    }

    function renderChapterCover(ch) {
      chapterCover.style.background = `linear-gradient(135deg, ${ch.colors[0]}, ${ch.colors[1]})`;
      chapterCover.innerHTML = `
        <p class="text-xs uppercase tracking-[0.2em] font-semibold opacity-90">Textbook Style</p>
        <h2 class="text-4xl md:text-5xl font-black mt-2">Chapter ${chapterIndex + 1}</h2>
        <p class="text-xl md:text-2xl font-bold mt-2">${ch.title}</p>
        <p class="mt-3 max-w-3xl text-white/95 leading-7">${ch.theme}. Chapter ini dirancang seperti buku ajar berwarna, dengan kombinasi teks naratif, poin grammar, kosakata inti, dan ilustrasi tematik untuk memudahkan pemahaman bertingkat.</p>
      `;
    }

    function renderPage() {
      const ch = chapters[chapterIndex];
      const pageNo = pageIndex + 1;
      renderChapterCover(ch);

      progressLabel.textContent = `Chapter ${chapterIndex + 1}/${chapters.length} - Page ${pageNo}/5`;
      pageTitle.textContent = pageTitles[pageIndex];
      pageSubtitle.textContent = `Tema: ${ch.theme} | Fokus: ${ch.focus}`;

      const p1 = longParagraph(ch, pageNo, "Pada tahap ini, siswa fokus pada akurasi bentuk.");
      const p2 = longParagraph(ch, pageNo, "Selanjutnya, siswa diarahkan ke kelancaran berbicara.");
      const p3 = longParagraph(ch, pageNo, "Kegiatan berpasangan memperkuat refleks komunikasi.");
      const p4 = longParagraph(ch, pageNo, "Setiap contoh dikaitkan dengan konteks sosial yang realistis.");
      const p5 = longParagraph(ch, pageNo, "Di akhir halaman, siswa menuliskan refleksi pembelajaran.");

      textbookContent.innerHTML = [p1, p2, p3, p4, p5]
        .map((p) => `<p>${p}</p>`)
        .join("");

      teacherNotes.innerHTML = [
        `Gunakan kosa kata target halaman ini: ${ch.vocab.join(", ")}.`,
        `Fokus grammar: ${ch.grammar}.`,
        "Latihan terbaik: baca keras 3 kali, tirukan intonasi, lalu improvisasi dialog baru.",
        "Catatan buku ajar: minta siswa menulis 8-12 kalimat yang relevan dengan kehidupan sehari-hari."
      ].map((n) => `<li>${n}</li>`).join("");

      pageImage1.src = `https://placehold.co/1200x520/${ch.colors[0].replace("#","")}/ffffff?text=Chapter+${chapterIndex + 1}+Page+${pageNo}+Visual+A`;
      pageImage2.src = `https://placehold.co/1200x520/${ch.colors[1].replace("#","")}/ffffff?text=Chapter+${chapterIndex + 1}+Page+${pageNo}+Visual+B`;

      prevPageBtn.disabled = pageIndex === 0;
      prevPageBtn.classList.toggle("opacity-50", pageIndex === 0);
      nextPageBtn.textContent = pageIndex === 4 ? "Tetap di Page 5" : "Next Page";

      prevChapterBtn.disabled = chapterIndex === 0;
      prevChapterBtn.classList.toggle("opacity-50", chapterIndex === 0);
      nextChapterBtn.textContent = chapterIndex === chapters.length - 1 ? "Kembali ke Chapter 1" : "Next Chapter";
    }

    prevPageBtn.addEventListener("click", () => {
      if (pageIndex > 0) {
        pageIndex -= 1;
        renderPage();
      }
    });

    nextPageBtn.addEventListener("click", () => {
      if (pageIndex < 4) {
        pageIndex += 1;
        renderPage();
      }
    });

    prevChapterBtn.addEventListener("click", () => {
      if (chapterIndex > 0) {
        chapterIndex -= 1;
        pageIndex = 0;
        renderPage();
      }
    });

    nextChapterBtn.addEventListener("click", () => {
      if (chapterIndex < chapters.length - 1) {
        chapterIndex += 1;
      } else {
        chapterIndex = 0;
      }
      pageIndex = 0;
      renderPage();
    });

    renderPage();
  </script>
</body>
</html>
