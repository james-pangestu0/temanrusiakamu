        grammar: ["Konsolidasi grammar A1 dan perbaikan akurasi."],
        vocab: ["Изучать - Mempelajari", "Каждый день - Setiap hari", "О себе - Tentang diri sendiri"],
        quiz: { q: "Mana kalimat paling lengkap dan benar untuk level A1?", options: ["Я из Индонезия.", "Меня зовут Анна, я из Индонезии и живу в Джакарте.", "Я жить Джакарта.", "Я русский язык."], answer: 1, explain: "Kalimat 2 paling tepat dan lengkap secara A1." }
      }
    ];

    let currentIndex = 0;
    let currentPageIndex = 0;
    let selectedAnswer = null;
    const progressKey = "a1InteractiveChaptersProgress";
    const progress = JSON.parse(localStorage.getItem(progressKey) || "{}");

    const chapterMeta = document.getElementById("chapter-meta");
    const chapterTitle = document.getElementById("chapter-title");
    const chapterGoal = document.getElementById("chapter-goal");
    const pageMeta = document.getElementById("page-meta");
    const chapterImage = document.getElementById("chapter-image");
    const imageCaption = document.getElementById("image-caption");
    const teachingPoints = document.getElementById("teaching-points");
    const nativeLines = document.getElementById("native-lines");
    const dialogue = document.getElementById("dialogue");
    const grammarList = document.getElementById("grammar-list");
    const vocabList = document.getElementById("vocab-list");
    const quizQuestion = document.getElementById("quiz-question");
    const quizOptions = document.getElementById("quiz-options");
    const quizFeedback = document.getElementById("quiz-feedback");
    const progressBar = document.getElementById("progress-bar");
    const progressLabel = document.getElementById("progress-label");
    const quizSection = document.getElementById("quiz-section");

    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const prevPageBtn = document.getElementById("prev-page-btn");
    const nextPageBtn = document.getElementById("next-page-btn");
    const checkAnswerBtn = document.getElementById("check-answer-btn");
    const markCompleteBtn = document.getElementById("mark-complete-btn");

    function buildPages(chapter, chapterNumber) {
      return [
        {
          title: "Fondasi Konsep",
          image: `https://placehold.co/1200x500/1d4ed8/ffffff?text=Chapter+${chapterNumber}+Page+1+-+Concept`,
          caption: `${chapter.title} - memahami konsep inti dan konteks penggunaan.`,
          teachingPoints: [
            ...chapter.teachingPoints,
            `Pemahaman inti: ${chapter.goal}`,
            "Catat 5 pola kalimat yang paling sering dipakai dalam komunikasi harian."
          ],
          nativeLines: chapter.nativeLines,
          dialogue: chapter.dialogue,
          grammar: chapter.grammar,
          vocab: chapter.vocab
        },
        {
          title: "Pola Kalimat Praktis",
          image: `https://placehold.co/1200x500/0f766e/ffffff?text=Chapter+${chapterNumber}+Page+2+-+Patterns`,
          caption: "Fokus pada kerangka kalimat yang dipakai penutur asli.",
          teachingPoints: [
            "Gunakan pola kalimat pendek dulu, lalu tambahkan keterangan tempat/waktu.",
            "Latihan transformasi kalimat positif, negatif, dan pertanyaan.",
            "Latihan shadowing: tirukan intonasi native 3 kali tiap kalimat."
          ],
          nativeLines: [
            ...chapter.nativeLines,
            "Скажите это медленно, потом быстро. (Ucapkan pelan lalu cepat.)"
          ],
          dialogue: chapter.dialogue,
          grammar: chapter.grammar,
          vocab: chapter.vocab
        },
        {
          title: "Latihan Konteks Harian",
          image: `https://placehold.co/1200x500/7c3aed/ffffff?text=Chapter+${chapterNumber}+Page+3+-+Daily+Context`,
          caption: "Skenario sehari-hari agar materi melekat lebih lama.",
          teachingPoints: [
            "Simulasikan 3 konteks: rumah, tempat kerja/sekolah, dan ruang publik.",
            "Buat 5 kalimat personal tentang rutinitasmu menggunakan topik chapter ini.",
            "Gunakan kosakata chapter untuk role-play 2 orang selama 2 menit."
          ],
          nativeLines: chapter.nativeLines,
          dialogue: [
            ...chapter.dialogue,
            "A: Можно ещё пример? B: Да, конечно."
          ],
          grammar: chapter.grammar,
          vocab: chapter.vocab
        },
        {
          title: "Pendalaman Grammar dan Pengucapan",
          image: `https://placehold.co/1200x500/be185d/ffffff?text=Chapter+${chapterNumber}+Page+4+-+Deep+Practice`,
          caption: "Penguatan akurasi grammar dan natural pronunciation.",
          teachingPoints: [
            "Identifikasi 3 kesalahan umum pemula lalu perbaiki.",
            "Drill grammar dengan substitution: ganti subjek, kata kerja, objek.",
            "Rekam suara sendiri, lalu bandingkan dengan model pengucapan."
          ],
          nativeLines: [
            "Повторение делает речь увереннее. (Pengulangan membuat bicara lebih percaya diri.)",
            ...chapter.nativeLines
          ],
          dialogue: chapter.dialogue,
          grammar: [
            ...chapter.grammar,
            "Perhatikan konsistensi akhir kata saat mengganti subjek atau kasus."
          ],
          vocab: chapter.vocab
        },
        {
          title: "Ringkasan dan Persiapan Quiz",
          image: `https://placehold.co/1200x500/ea580c/ffffff?text=Chapter+${chapterNumber}+Page+5+-+Summary+Quiz`,
          caption: "Halaman rangkuman sebelum mengerjakan quiz chapter.",
          teachingPoints: [
            "Review cepat semua poin chapter ini.",
            "Ulangi 10 kosakata kunci tanpa melihat catatan.",
            "Jawab quiz setelah mampu membuat minimal 3 kalimat sendiri."
          ],
          nativeLines: chapter.nativeLines,
          dialogue: chapter.dialogue,
          grammar: chapter.grammar,
          vocab: chapter.vocab
        }
      ];
    }

    function renderList(target, items) {
      target.innerHTML = "";
      items.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        target.appendChild(li);
      });
    }

    function renderChapter() {
      const c = chapters[currentIndex];
      const pages = buildPages(c, currentIndex + 1);
      const page = pages[currentPageIndex];
      selectedAnswer = null;
      quizFeedback.textContent = "";

      chapterMeta.textContent = `Chapter ${currentIndex + 1} dari ${chapters.length}`;
      chapterTitle.textContent = c.title;
      chapterGoal.textContent = c.goal;
      pageMeta.textContent = `Halaman ${currentPageIndex + 1} dari 5 - ${page.title}`;
      chapterImage.src = page.image || c.image;
      imageCaption.textContent = page.caption || c.caption;

      renderList(teachingPoints, page.teachingPoints);
      renderList(grammarList, page.grammar);
      renderList(vocabList, page.vocab);

      nativeLines.innerHTML = "";
      page.nativeLines.forEach((line) => {
        const box = document.createElement("div");
        box.className = "bg-blue-50 border border-blue-200 rounded-lg p-3 text-gray-700";
        box.textContent = line;
        nativeLines.appendChild(box);
      });

      dialogue.innerHTML = "";
      page.dialogue.forEach((line) => {
        const p = document.createElement("p");
        p.textContent = line;
        dialogue.appendChild(p);
      });

      quizQuestion.textContent = c.quiz.q;
      quizOptions.innerHTML = "";
      c.quiz.options.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.className = "w-full text-left px-3 py-2 rounded-lg border border-gray-300 hover:bg-gray-50";
        btn.textContent = `${String.fromCharCode(65 + idx)}. ${opt}`;
        btn.addEventListener("click", () => {
          selectedAnswer = idx;
          quizOptions.querySelectorAll("button").forEach((b) => {
            b.classList.remove("ring-2", "ring-blue-500");
          });
          btn.classList.add("ring-2", "ring-blue-500");
        });
        quizOptions.appendChild(btn);
      });

      prevBtn.disabled = currentIndex === 0;
      prevBtn.classList.toggle("opacity-50", currentIndex === 0);
      nextBtn.textContent = currentIndex === chapters.length - 1 ? "Kembali ke Chapter 1" : "Next Chapter";
      prevPageBtn.disabled = currentPageIndex === 0;
      prevPageBtn.classList.toggle("opacity-50", currentPageIndex === 0);
      nextPageBtn.textContent = currentPageIndex === 4 ? "Tetap di Halaman Quiz" : "Next Page";
      quizSection.classList.toggle("hidden", currentPageIndex !== 4);
      updateProgress();
    }

    function updateProgress() {
      const done = Object.values(progress).filter(Boolean).length;
      const percent = Math.round((done / chapters.length) * 100);
      progressBar.style.width = `${percent}%`;
      progressLabel.textContent = `Selesai: ${done}/${chapters.length} chapter (${percent}%)`;
    }

    checkAnswerBtn.addEventListener("click", () => {
      const answer = chapters[currentIndex].quiz.answer;
      const explain = chapters[currentIndex].quiz.explain;
      if (selectedAnswer === null) {
        quizFeedback.textContent = "Pilih jawaban dulu ya.";
        quizFeedback.className = "text-sm mt-3 text-amber-700";
        return;
      }
      const correct = selectedAnswer === answer;
      quizFeedback.textContent = correct ? `Benar. ${explain}` : `Belum tepat. ${explain}`;
      quizFeedback.className = `text-sm mt-3 ${correct ? "text-emerald-700" : "text-red-700"}`;
    });

    markCompleteBtn.addEventListener("click", () => {
      progress[`chapter-${currentIndex + 1}`] = true;
      localStorage.setItem(progressKey, JSON.stringify(progress));
      updateProgress();
      quizFeedback.textContent = "Chapter ditandai selesai.";
      quizFeedback.className = "text-sm mt-3 text-blue-700";
    });

    prevBtn.addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex -= 1;
        currentPageIndex = 0;
        renderChapter();
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentIndex < chapters.length - 1) {
        currentIndex += 1;
      } else {
        currentIndex = 0;
      }
      currentPageIndex = 0;
      renderChapter();
    });

    prevPageBtn.addEventListener("click", () => {
      if (currentPageIndex > 0) {
        currentPageIndex -= 1;
        renderChapter();
      }
    });

    nextPageBtn.addEventListener("click", () => {
      if (currentPageIndex < 4) {
        currentPageIndex += 1;
        renderChapter();
      }
    });

    renderChapter();
  </script>
</body>
</html>
